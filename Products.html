<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Homemade Bracelets by Ziks</title>
    <link rel="stylesheet" href="../Style/style.css">
        <style>
            .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem;
            padding: 2rem 5%;
        }
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 1px solid #eee;
        }
        .product-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
        }
        .price {
            color: #D4AF37;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 0.5rem 0;
        }
        .btn {
            background: #D4AF37;
            color: #333;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover {
            background: #C5A028;
        }
    </style>
</head>
<body>
    <header>
            <div class="logo">
        <img src="../Assets/logo.jpg" alt="Homemade Bracelets by Ziks Logo" class="logo-image">
        <div class="logo-text">
            <h1>Homemade Bracelet <span>by Ziks</span></h1>
            <p>Handcrafted with love, designed for you</p>
        </div>
                    <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="about-us.html">About Us</a></li>
                <li><a href="cart.html">Cart (<span id="cartCount">0</span>)</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div style="text-align: center; padding: 2rem 5% 0;">
            <h2>Our Collection</h2>
            <p>Handcrafted bracelets made with love and attention to detail</p>
        </div>
        
        <div class="product-grid" id="productsGrid">
            <!-- Products will go here -->
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 Homemade Bracelets by Ziks | Created by Aziki Woolcock (2301230)</p>
    </footer>
    
    <script>
                var products = [
            { id: 1, name: "Beaded Charm", price: 3900, image: "../Assets/beaded charm.jpg", desc: "Beautiful beaded design with elegant charm" },
            { id: 2, name: "Gold Bracelet ", price: 5070, image: "../Assets/Gold Bracelet.jpg", desc: "Classic handmade bracelet" },
            { id: 3, name: "Charms Bracelet", price: 4680, image: "../Assets/charms.jpg", desc: "Adorable charm bracelet" },
            { id: 4, name: "Fine Beads", price: 4368, image: "../Assets/Fine beads.jpg", desc: "Delicate fine bead bracelet" },
            { id: 5, name: "Regular Beads", price: 5460, image: "../Assets/Regular beads.jpg", desc: "Everyday wear bead bracelet" }
        ];
        
                function showProducts() {
            var container = document.getElementById("productsGrid");
            if (!container) return;
            
            var html = "";
            
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                html += '<div class="product-card">';
                html += '<img src="' + p.image + '" alt="' + p.name + '" onerror="this.src=\'https://placehold.co/300x300/D4AF37/FFFFFF?text=' + p.name + '\'">';
                html += '<h3>' + p.name + '</h3>';
                html += '<p style="color: #666;">' + p.desc + '</p>';
                html += '<p class="price">J$' + p.price.toFixed(2) + '</p>';
                html += '<button class="btn" onclick="addToCart(' + p.id + ', \'' + p.name + '\', ' + p.price + ', \'' + p.image + '\')">Add to Cart</button>';
                html += '</div>';
            }
            
            container.innerHTML = html;
        }
        
            function addToCart(id, name, price, image) {
            var cart = JSON.parse(localStorage.getItem("ziksCart") || "[]");
            var found = false;
            
            for (var i = 0; i < cart.length; i++) {
                if (cart[i].id === id) {
                    cart[i].quantity = cart[i].quantity + 1;
                    found = true;
                    break;
                }
            }
            
            if (!found) {
                cart.push({
                    id: id,
                    name: name,
                    price: price,
                    quantity: 1,
                    image: image
                });
            }
            
            localStorage.setItem("ziksCart", JSON.stringify(cart));
            updateCartCount();
            alert(name + " added to cart!");
        }
        
                function updateCartCount() {
            var cart = JSON.parse(localStorage.getItem("ziksCart") || "[]");
            var total = 0;
            for (var i = 0; i < cart.length; i++) {
                total = total + cart[i].quantity;
            }
            var countSpan = document.getElementById("cartCount");
            if (countSpan) {
                countSpan.innerHTML = total;
            }
        }
        
                showProducts();
        updateCartCount();
    </script>
</body>
</html>

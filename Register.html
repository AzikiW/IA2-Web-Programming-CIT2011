<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Homemade Bracelets by Ziks</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" 
</head>
<body>
    <header>
        <div class="logo">
            <h1>Homemade Bracelet <span>by Ziks</span></h1>
            <p>Handcrafted with love, designed for you</p>
        </div>
        <nav>
            <ul>
                <li><a href="index.html"> Home</a></li>
                <li><a href="products.html"> Products</a></li>
                <li><a href="about-us.html"> About Us</a></li>
                <li><a href="cart.html"> Cart (<span id="cartCount">0</span>)</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <div class="form-container">
            <h2> Create Account</h2>
            <form onsubmit="return validateRegistration()">
                <div class="form-group">
                    <label> Full Name:</label>
                    <input type="text" id="regName" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label> Date of Birth:</label>
                    <input type="date" id="regDob" required>
                </div>
                <div class="form-group">
                    <label> Email:</label>
                    <input type="email" id="regEmail" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label> Username:</label>
                    <input type="text" id="regUsername" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label> Password:</label>
                    <input type="password" id="regPassword" required placeholder="At least 6 characters">
                </div>
                <div class="form-group">
                    <label> Confirm Password:</label>
                    <input type="password" id="regConfirm" required placeholder="Re-enter password">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Register</button>
                <p style="text-align: center; margin-top: 1rem;">
                    Already have an account? <a href="login.html">Login here</a>
                </p>
            </form>
        </div>
    </main>
    
    <footer>
        <p>&copy; 2026 Homemade Bracelet by Ziks | Created by Aziki Woolcock (2301230)</p>
    </footer>
    
    <script src="../style/script.js"></script>
</body>
</html>
